# Environment Args
output_root: './work_dirs/v3'
pytorch_data_dir: '/hdd1/zys/MillionAID/'
submitting_to_aml: false

# Dataset args
dataset: "million_aid"

# Model Args
model_type: "dinov3"
activation_type: "token"

# Upsampling args
outlier_detection: True
upsampler_type: "jbu_stack"
downsampler_type: "attention"
max_pad: 20
max_zoom: 2
n_jitters: 5
random_projection: 30
crf_weight: 0.001
filter_ent_weight: 0.0
tv_weight: 0.0
rec_img_weight: 0

implicit_sup_weight: 1.0

# Training args
batch_size: 2  
epochs: 1
num_gpus: 1
num_workers: 1
lr: 1e-3
limit_train_batches: -1

# No need to change
hydra:
  run:
    dir: "."
  output_subdir: ~

